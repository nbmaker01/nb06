<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>WebXR A-Frame GLB Example</title>
  <!-- A-Frame 라이브러리 불러오기 -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <!-- GLTF/GLB 모델 로더 -->
  <script src="https://cdn.jsdelivr.net/npm/aframe-gltf-model-component/dist/aframe-gltf-model-component.min.js"></script>
</head>

<body>
  <!-- A-Frame Scene 시작 -->
  <a-scene vr-mode-ui="enabled: true">

    <!-- ========================= -->
    <!-- 카메라 & 이동 설정 -->
    <!-- ========================= -->
    <!-- WASD 키 + 마우스로 이동 가능 -->
    <a-entity 
      id="cameraRig"
      position="0 1.6 5"
      movement-controls="speed: 0.1">

      <!-- 실제 카메라 -->
      <a-camera 
        look-controls="pointerLockEnabled: true">
      </a-camera>
    </a-entity>

    <!-- ========================= -->
    <!-- VR 컨트롤러 -->
    <!-- ========================= -->
    <!-- 왼쪽 컨트롤러 -->
    <a-entity 
      laser-controls="hand: left"
      raycaster="objects: .clickable">
    </a-entity>

    <!-- 오른쪽 컨트롤러 -->
    <a-entity 
      laser-controls="hand: right"
      raycaster="objects: .clickable">
    </a-entity>

    <!-- ========================= -->
    <!-- 하늘 (Sky) -->
    <!-- ========================= -->
    <a-sky color="#87CEEB"></a-sky>

    <!-- ========================= -->
    <!-- 바닥 (Ground) -->
    <!-- ========================= -->
    <a-plane 
      rotation="-90 0 0"
      width="50"
      height="50"
      color="#7BC8A4">
    </a-plane>

    <!-- ========================= -->
    <!-- 조명 설정 -->
    <!-- ========================= -->

    <!-- 전체 밝기 -->
    <a-light type="ambient" intensity="0.5"></a-light>

    <!-- 방향성 조명 -->
    <a-light 
      type="directional" 
      position="2 4 2"
      intensity="1">
    </a-light>

    <!-- ========================= -->
    <!-- 3D 모델 (GLB) -->
    <!-- ========================= -->
    <a-entity 
      gltf-model="model.glb"
      position="0 0 -3"   <!-- 앞쪽 중앙 -->
      scale="2 2 2"       <!-- 적당히 크게 -->
      rotation="0 45 0">  <!-- 약간 회전 -->
    </a-entity>

  </a-scene>
</body>
</html>
